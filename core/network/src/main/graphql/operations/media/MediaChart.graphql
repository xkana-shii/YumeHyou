query MediaChart($page: Int, $perPage: Int, $sort: [MediaSort], $type: MediaType,
    $status: MediaStatus, $format: MediaFormat, $isAdult: Boolean
) {
    Page(page: $page, perPage: $perPage) {
        media(sort: $sort, type: $type, status: $status, format: $format, isAdult: $isAdult) {
            ...BasicMediaDetails
            format
            startDate {
                year
            }
            coverImage {
                large
            }
            meanScore
            mediaListEntry {
                ...BasicMediaListEntry
            }
        }
        pageInfo {
            ...CommonPage
        }
    }
}
